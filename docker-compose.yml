# Uygulama konteyneri. Veritabanı: .env içindeki DATABASE_URL (harici PostgreSQL).
# Coolify: ortam değişkenlerinde kapanmamış ${...} veya açıklama metni değer olarak kullanmayın

services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
    container_name: denetim-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3030}:3030"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
